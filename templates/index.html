<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Furrymon Multi-Hub Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { --bg: #1e1e2e; --panel: #282a36; --accent: #bd93f9; --text: #f8f8f2; --pink: #ff79c6; --green: #50fa7b; --red: #ff5555; --orange: #ffb86c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 12px; font-size: 14px; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        h1 { font-size: 18px; color: var(--accent); text-align: center; margin: 5px 0; }
        .card { background: var(--panel); border: 1px solid #44475a; border-radius: 8px; padding: 12px; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 5px; }
        .stat-box { background: #21222c; padding: 8px; border-radius: 4px; font-weight: bold; }
        .btn { display: block; width: 100%; padding: 12px; text-align: center; border: none; border-radius: 6px; font-weight: bold; color: #fff; cursor: pointer; font-size: 13px; margin: 6px 0; }
        .btn-farm { background: var(--pink); } .btn-stop { background: var(--red); } .btn-siphon { background: var(--orange); color: #000; } .btn-sub { background: var(--accent); }
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; margin: 5px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; }
        input[type="text"], input[type="number"], input[type="password"] { width: 100%; padding: 10px; background: #1e1e2e; border: 1px solid #6272a4; color: #fff; border-radius: 4px; margin: 4px 0; font-size: 13px; }
        .log-console { background: #1e1e2e; border: 1px solid #44475a; height: 160px; overflow-y: auto; font-family: monospace; padding: 8px; font-size: 11px; border-radius: 4px; white-space: pre-wrap; }
        .account-row { background: #21222c; border: 1px solid #44475a; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .btn-sm { padding: 4px 8px; font-size: 11px; border-radius: 3px; border: none; cursor: pointer; font-weight: bold; }
        .action-container { display: flex; gap: 4px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Furrymon Multi-Hub Mobile</h1>
        
        <div class="card">
            <div class="status-grid">
                <div class="stat-box" id="status" style="color:var(--red)">Status: Idle</div>
                <div class="stat-box" id="batch" style="color:var(--pink)">Batch 0/3</div>
                <div class="stat-box" id="countdown" style="color:var(--orange)">Next In: 0s</div>
                <div class="stat-box" id="total-accs" style="color:#8be9fd">Managed: 0</div>
            </div>
            <button class="btn btn-farm" onclick="startFarm()">🚀 START PARALLEL FARMING</button>
            <button class="btn btn-stop" onclick="apiCall('/stop-farm')">🛑 STOP ALL ACTIONS</button>
        </div>

        <div class="card">
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" id="chk-collect" checked onchange="toggleOption('chk_collect')"> Auto-Collect Habitats Every Cycle</label>
                <label class="checkbox-item"><input type="checkbox" id="chk-exchange" checked onchange="toggleOption('chk_exchange')"> Auto-Buy Reward-7 (900 Pts Check)</label>
            </div>
        </div>

        <div class="card" style="border: 1px solid var(--accent);">
            <h3 style="color:var(--accent);margin-bottom:4px;">🔑 External Account Target Siphon</h3>
            <input type="text" id="ext-username" placeholder="External Main Account Username">
            <input type="password" id="ext-password" placeholder="External Main Account Password">
            <button class="btn-sm btn-sub" style="width:100%; padding:10px; margin-bottom:6px; background:#8be9fd; color:#282a36;" onclick="fetchExternalAssets()">🔍 Fetch External Assets</button>
            <div style="display: flex; gap: 4px; margin: 4px 0;">
                <input type="text" id="ext-target-asset-cache" placeholder="Ext Asset Locked: None" style="flex:1;" readonly>
                <input type="text" id="ext-target-alt" placeholder="Sender Alt" style="width:120px;" readonly>
            </div>
            <button class="btn btn-sub" style="background:var(--accent);color:#1e1e2e;" onclick="executeExternalSiphon()">🌌 Execute External Siphon Handshake</button>
        </div>

        <div class="card">
            <h3 style="color:var(--orange);margin-bottom:4px;">💎 Diamond Siphon Matrix v2 (Auto-Sweep)</h3>
            <input type="text" id="target-user" placeholder="Target Receiver: None" readonly>
            <input type="text" id="target-asset" placeholder="Target Asset ID: None" readonly>
            <input type="number" id="siphon-price" value="1" onchange="updateSiphonPrice(this.value)">
            <button class="btn btn-siphon" onclick="executeSiphon()">📥 Siphon All Diamonds to Target</button>
        </div>

        <div class="card">
            <h3 style="color:var(--accent);margin-bottom:4px;">Account Tools</h3>
            <button class="btn" style="background:var(--green);color:#282a36;margin-bottom:8px;" onclick="refreshAllStats()">🔄 Refresh All Account Stats</button>
            <div style="display:grid;grid-template-columns: 1fr 1fr; gap:6px;">
                <button class="btn-sm btn-sub" style="padding:10px;" onclick="bulkSignup()">+ Bulk 10 Alts</button>
                <button class="btn-sm btn-stop" style="padding:10px;" onclick="clearAccounts()">🗑️ Clear All</button>
            </div>
            <div id="accounts-list" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
        </div>

        <div class="card">
            <h3 style="color:var(--accent);margin-bottom:4px;">System Log Console Output</h3>
            <div class="log-console" id="log-output"></div>
        </div>
    </div>

    <script>
        function getLocalAccounts() { return JSON.parse(localStorage.getItem('fmu_accounts') || '[]'); }
        function saveLocalAccounts(accs) { localStorage.setItem('fmu_accounts', JSON.stringify(accs)); }

        function apiCall(endpoint) { axios.post(endpoint); }
        function toggleOption(opt) { axios.post('/toggle-config', {option: opt}); }
        function updateSiphonPrice(val) { axios.post('/update-price', {price: val}); }

        function startFarm() {
            syncLocalStorageToServer(() => {
                axios.post('/start-farm', { accounts: getLocalAccounts() });
            });
        }

        function bulkSignup() {
            axios.post('/bulk-signup').then(res => {
                if(res.data.created) {
                    let current = getLocalAccounts();
                    let updated = current.concat(res.data.created);
                    saveLocalAccounts(updated);
                    updateDashboard();
                }
            });
        }

        function refreshAllStats() {
            let accs = getLocalAccounts();
            if (accs.length === 0) return alert("No accounts in local storage to refresh.");
            axios.post('/refresh-stats', { accounts: accs });
        }

        function clearAccounts() {
            if(confirm('Wipe local layout account database?')) {
                saveLocalAccounts([]);
                axios.post('/clear-accounts');
                updateDashboard();
            }
        }

        function selectTarget(user, pass) {
            axios.post('/set-target', {username: user, password: pass});
        }

        function setExternalSenderAlt(user) {
            document.getElementById('ext-target-alt').value = user;
        }

        function fetchExternalAssets() {
            let user = document.getElementById('ext-username').value.trim();
            let pass = document.getElementById('ext-password').value.trim();
            if(!user || !pass) return alert("Please enter the external account user and password fields first.");
            axios.post('/fetch-external-assets', { external_username: user, external_password: pass });
        }

        function executeExternalSiphon() {
            let user = document.getElementById('ext-username').value.trim();
            let pass = document.getElementById('ext-password').value.trim();
            let altSender = document.getElementById('ext-target-alt').value.trim();

            if (!user || !pass || !altSender) return alert("Please type external credentials, click 'Fetch External Assets', and select a card profile sender below.");
            
            axios.post('/execute-external-siphon', {
                external_username: user,
                external_password: pass,
                target_alt_username: altSender,
                accounts: getLocalAccounts()
            });
        }

        function executeSiphon() {
            syncLocalStorageToServer(() => {
                axios.post('/execute-siphon', { accounts: getLocalAccounts() });
            });
        }

        function syncLocalStorageToServer(callback) {
            let accs = getLocalAccounts();
            axios.post('/sync-accounts', { accounts: accs }).then(() => {
                if(callback) callback();
            });
        }

        function copyToClipboard(str) {
            const el = document.createElement('textarea');
            el.value = str;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('Copied credentials: ' + str);
        }

        function updateDashboard() {
            axios.get('/state').then(res => {
                const data = res.data;
                if (data.accounts && data.accounts.length > 0) {
                    saveLocalAccounts(data.accounts);
                }

                const localAccs = getLocalAccounts();

                document.getElementById('status').innerText = 'Status: ' + data.status;
                document.getElementById('status').style.color = data.status.includes('RUNNING') ? 'var(--green)' : 'var(--red)';
                document.getElementById('batch').innerText = 'Phase: ' + data.batch_phase;
                document.getElementById('countdown').innerText = 'Next In: ' + data.countdown + 's';
                document.getElementById('total-accs').innerText = 'Managed: ' + localAccs.length;
                document.getElementById('target-user').value = data.receiver_username ? 'Receiver: ' + data.receiver_username : '';
                document.getElementById('target-asset').value = data.receiver_asset_id ? 'Asset: ' + data.receiver_asset_id : '';
                document.getElementById('ext-target-asset-cache').value = data.ext_receiver_asset_id ? 'ID: ' + data.ext_receiver_asset_id : '';
                
                const logBox = document.getElementById('log-output');
                const isScrolledToBottom = logBox.scrollHeight - logBox.clientHeight <= logBox.scrollTop + 1;
                logBox.innerText = data.logs.join('\n');
                if (isScrolledToBottom) { logBox.scrollTop = logBox.scrollHeight; }

                let accHtml = '';
                localAccs.forEach(acc => {
                    const rawCreds = acc.username + ':' + acc.password;
                    accHtml += `<div class="account-row">
                        <div>
                            <strong>${acc.username}</strong><br>
                            <span style="color:var(--green)">💎 ${acc.diamonds || 0} | 🏆 ${acc.points || 0} Pts</span>
                            <div class="action-container">
                                <button class="btn-sm btn-sub" onclick="selectTarget('${acc.username}', '${acc.password}')">🎯 Target</button>
                                <button class="btn-sm" style="background:#ffb86c;color:#1e1e2e;" onclick="setExternalSenderAlt('${acc.username}')">📥 Select Sender</button>
                                <button class="btn-sm" style="background:#8be9fd;color:#282a36;" onclick="copyToClipboard('${rawCreds}')">📋 Copy</button>
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById('accounts-list').innerHTML = accHtml;
            }).catch(err => {});
        }

        setInterval(() => {
            let accs = getLocalAccounts();
            if(accs.length > 0) { axios.post('/sync-accounts', { accounts: accs }); }
        }, 5000);

        setInterval(updateDashboard, 1000);
    </script>
</body>
</html>
